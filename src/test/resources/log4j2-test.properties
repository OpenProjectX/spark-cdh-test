# Suppress verbose Spark/Hadoop/Iceberg logging during tests.
# Only ERROR-level messages (and WARNs from the test layer) are shown.

rootLogger.level = DEBUG
rootLogger.appenderRef.console.ref = Console

appender.console.type     = Console
appender.console.name     = Console
appender.console.layout.type    = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss} %-5level %-40logger{40} - %msg%n

